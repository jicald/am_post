name: run am_post

on:
  schedule:
    - cron: "0 10 * * *"  # 毎日10:00 UTC（日本時間19:00）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node src/index.js
